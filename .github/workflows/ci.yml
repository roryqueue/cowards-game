name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  fast:
    name: Fast checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: bytecodealliance/actions/wasmtime/setup@v1
        with:
          version: latest
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:fast

  service-e2e:
    name: Service-backed E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: cowards
          POSTGRES_PASSWORD: cowards
          POSTGRES_DB: cowards_game
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cowards -d cowards_game"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://cowards:cowards@localhost:5432/cowards_game
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm preflight -- --skip-web
      - run: pnpm e2e:service

  visual-e2e:
    name: Replay visual regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e:visual
